<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Τα Γλυκά μας - Ζαχαροπλαστείο Ο Χριστόφορος</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
</head>
<body>

  <!-- Hero -->
  <div class="menu-hero">
    <h1 class="text-4xl font-extrabold mb-2" data-i18n="menu-page-title">Τα γλυκά μας</h1>
    <p class="text-lg opacity-85" data-i18n="menu-page-subtitle">Ανακαλύψτε τα προιόντα μας!</p>
  </div>
  
  <!-- Content Wrapper for Parallax -->
  <div id="parallax-wrapper">
    <!-- Category Buttons -->
    <div class="py-4 px-4 bg-gradient-to-b from-white to-gray-50">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-wrap gap-3 justify-center">
          <button class="menu-category-btn active" data-category="pastry" data-i18n="cat-pastry">Πάστες</button>
          <button class="menu-category-btn" data-category="individual" data-i18n="cat-individual">Ατομικά Γλυκά</button>
          <button class="menu-category-btn" data-category="family" data-i18n="cat-family">Οικογενειακά Γλυκά</button>
          <button class="menu-category-btn" data-category="cake" data-i18n="cat-cake">Τούρτες</button>
          <button class="menu-category-btn" data-category="cakeicecream" data-i18n="cat-cakeicecream">Τούρτες Παγωτό</button>
          <button class="menu-category-btn" data-category="syropy" data-i18n="cat-syropy">Σιροπιαστά Γλυκά Ταψιού</button>
          <button class="menu-category-btn" data-category="individualsyropy" data-i18n="cat-individualsyropy">Ατομικά Σιροπιαστά Γλυκά Ταψιού</button>
          <button class="menu-category-btn" data-category="bisquit" data-i18n="cat-bisquit">Βουτήματα & Κουλουράκια</button>
          <button class="menu-category-btn" data-category="icecream" data-i18n="cat-icecream">Χειροποίητο Παγωτό</button>
          <button class="menu-category-btn" data-category="treats" data-i18n="cat-treats">Κεράσματα</button>
          <button class="menu-category-btn" data-category="wrapped" data-i18n="cat-wrapped">Κεράσματα Τυλιχτά</button>
          <button class="menu-category-btn" data-category="seasonal" data-i18n="cat-seasonal">Εποχιακά</button>
        </div>
      </div>
    </div>

    <!-- Menu Sections (generated dynamically by renderer) -->
    <main>
    </main>
    
  <script src="js/translations.js"></script>
  <script src="js/parallax-cover.js"></script>
  <script src="js/scroll-reveal.js"></script>
  <script src="js/load-components.js"></script>
  <script src="js/menu-card-renderer.js"></script>
  <script src="js/menu-tabs.js"></script>
</body>
</html>
