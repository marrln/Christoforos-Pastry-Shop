<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Φτιάξε την τούρτα σου - Χριστόφορος</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
</head>
<body class="bg-white text-slate-900">
  <main class="make-cake-page">
    <section class="menu-hero py-20 px-4 text-center", style="background-image: url('assets/cover.avif'); background-size: cover; background-position: center;">
       <div class="relative z-10">
      <div class="max-w-4xl mx-auto">
        <p class="text-pink-600 font-semibold uppercase tracking-[0.4em] mb-4">Φτιάξτε τη δική σας τούρτα</p>
        <h1 class="text-4xl md:text-5xl font-extrabold mb-5" data-i18n="cake-order-title">Φτιάξε την τούρτα σου</h1>
        <p class="text-lg md:text-xl opacity-80 max-w-3xl mx-auto" data-i18n="cake-order-subtitle">Επίλεξε σχήμα, γεύση, διακόσμηση και για πόσα άτομα θα είναι.</p>
      </div>
    </section>

    <section class="py-14 px-4">
      <div class="max-w-6xl mx-auto grid">
        <div class="space-y-6">
          <div class="rounded-[2rem] border border-pink-100 bg-white p-8 shadow-sm">
            <div class="mb-6">
              <h2 class="text-3xl font-bold mb-3" data-i18n="cake-order-intro">Σχεδίασε την ειδική σου τούρτα</h2>
              <p class="text-slate-600">Μόλις συμπληρώσεις τη φόρμα, θα λάβουμε το αίτημά σου και θα σε ενημερώσουμε σύντομα.</p>
            </div>

            <form id="cake-order-form" action="https://formspree.io/f/your-form-id" method="POST" class="space-y-6 rounded-[1.5rem] bg-slate-50 p-6">
              <!-- Replace action with your Formspree endpoint -->
              <div class="grid gap-5 sm:grid-cols-3">
                <label class="space-y-4 sm:col-span-2">
                  <span class="font-semibold" data-i18n="form-shape-label">Σχήμα τούρτας</span>
                  <input type="hidden" name="shape" id="shape-input" required />
                  <div id="shape-buttons" class="grid gap-3 sm:grid-cols-3">
                    <button type="button" class="shape-option" data-value="Round">
                      <img src="assets/icons/cakes/circle2.png" alt="Round" />
                      <span>Στρογγυλή</span>
                    </button>
                    <button type="button" class="shape-option" data-value="Square">
                      <img src="assets/icons/cakes/square2.png" alt="Square" />
                      <span>Τετράγωνη</span>
                    </button>
                    <button type="button" class="shape-option" data-value="Heart">
                      <img src="assets/icons/cakes/heart2.png" alt="Heart" />
                      <span>Καρδιά</span>
                    </button>
                    <button type="button" class="shape-option" data-value="Rectangle">
                      <img src="assets/icons/cakes/rectangle2.png" alt="Rectangle" />
                      <span>Ορθογώνια</span>
                    </button>
                    <button type="button" class="shape-option" data-value="Number">
                      <img src="assets/icons/cakes/number2.png" alt="Number" />
                      <span>Αριθμός</span>
                    </button>
                  </div>
                </label>

                <label class="space-y-2 sm:col-span-1">
                  <span class="font-semibold" data-i18n="form-flavor-label">Γεύση</span>
                  <select name="flavor" required class="form-select w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-pink-300 focus:ring-2 focus:ring-pink-100">
                    <option value="" disabled selected data-i18n="form-flavor-placeholder">Επίλεξε γεύση</option>
                    <option value="Vanilla">Βανίλια</option>
                    <option value="Chocolate">Σοκολάτα</option>
                    <option value="Red Velvet">Red Velvet</option>
                    <option value="Coffee">Καφές</option>
                    <option value="Lemon">Λεμόνι</option>
                    <option value="Caramel">Καραμέλα</option>
                    <option value="Raspberry">Σμέουρο</option>
                    <option value="Mixed">Μικτή</option>
                  </select>

                  <div id="number-input-wrapper" class="hidden mt-4">
                    <label class="space-y-2">
                      <span class="font-semibold" data-i18n="form-number-label">Αριθμός στην τούρτα</span>
                      <input id="cake-number-input" type="text" name="cakeNumber" placeholder="Π.χ. 21" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-pink-300 focus:ring-2 focus:ring-pink-100" />
                    </label>
                  </div>
                </label>
              </div>

              <div class="space-y-2">
                <label class="font-semibold" data-i18n="form-serves-label">Για πόσα άτομα</label>
                <select id="serves-select" name="serves" required class="form-select w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-pink-300 focus:ring-2 focus:ring-pink-100">
                  <option value="" disabled selected>Επίλεξε πόσα άτομα</option>
                  <option value="8-10">8-10 άτομα</option>
                  <option value="10-12">10-12 άτομα</option>
                  <option value="12-14">12-14 άτομα</option>
                  <option value="14-16">14-16 άτομα</option>
                  <option value="16-20">16-20 άτομα</option>
                </select>
              </div>

              <div class="space-y-3 rounded-3xl border border-slate-200 bg-white p-4">
                <div class="font-semibold" data-i18n="form-decoration-label">Decoration Options</div>
                <div class="grid gap-3 sm:grid-cols-2">
                  <label class="inline-flex items-start gap-3">
                    <input type="checkbox" name="decorations[]" value="Chocolate Drip" class="mt-1 h-4 w-4 rounded border-slate-300 text-pink-600 focus:ring-pink-500" />
                    <span>Chocolate drip</span>
                  </label>
                  <label class="inline-flex items-start gap-3">
                    <input type="checkbox" name="decorations[]" value="Fresh Fruit" class="mt-1 h-4 w-4 rounded border-slate-300 text-pink-600 focus:ring-pink-500" />
                    <span>Fresh fruit</span>
                  </label>
                  <label class="inline-flex items-start gap-3">
                    <input type="checkbox" name="decorations[]" value="Edible Gold" class="mt-1 h-4 w-4 rounded border-slate-300 text-pink-600 focus:ring-pink-500" />
                    <span>Edible gold</span>
                  </label>
                  <label class="inline-flex items-start gap-3">
                    <input type="checkbox" name="decorations[]" value="Personalized Message" class="mt-1 h-4 w-4 rounded border-slate-300 text-pink-600 focus:ring-pink-500" />
                    <span>Personalized message</span>
                  </label>
                  <label class="inline-flex items-start gap-3 sm:col-span-2">
                    <input type="checkbox" name="decorations[]" value="Sprinkles" class="mt-1 h-4 w-4 rounded border-slate-300 text-pink-600 focus:ring-pink-500" />
                    <span>Sprinkles</span>
                  </label>
                </div>
              </div>

              <div class="grid gap-5 sm:grid-cols-2">
                <label class="space-y-2">
                  <span class="font-semibold" data-i18n="form-email-label">Email</span>
                  <input id="customer-email" type="email" name="_replyto" required placeholder="you@email.com" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-pink-300 focus:ring-2 focus:ring-pink-100" />
                </label>
                <label class="space-y-2">
                  <span class="font-semibold" data-i18n="form-phone-label">Τηλέφωνο</span>
                  <input id="customer-phone" type="tel" name="phone" required placeholder="+30 69xxxxxxxx" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-pink-300 focus:ring-2 focus:ring-pink-100" />
                </label>
              </div>

              <label class="space-y-2">
                <span class="font-semibold" data-i18n="form-note-label">Σημειώσεις</span>
                <textarea name="notes" rows="4" placeholder="Πρόσθετες απαιτήσεις, μήνυμα, λεπτομέρειες παραγγελίας..." class="w-full rounded-3xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-pink-300 focus:ring-2 focus:ring-pink-100"></textarea>
              </label>

              <input type="hidden" name="estimatedKilos" id="estimated-kilos-input" value="" />

              <div id="kilos-display" class="rounded-2xl border border-pink-100 bg-pink-50 p-4 text-sm text-pink-700">
                <span data-i18n="form-kilos-value">Εκτιμώμενα κιλά: 0</span>
              </div>

              <div id="form-feedback" class="min-h-[2rem] text-sm text-red-600"></div>

              <button type="submit" class="btn-primary w-full rounded-3xl py-4 text-lg font-semibold" data-i18n="form-submit">Αποστολή Αιτήματος</button>
            </form>
          </div>
        </div>

            <p class="text-slate-700" data-i18n="form-info-text">Επίλεξε σχήμα τούρτας, γεύση και διακοσμήσεις. Θα υπολογίσουμε τα εκτιμώμενα κιλά βάσει σερβιρίσματος και θα στείλουμε περίληψη παραγγελίας στο email σου.</p>

      <!-- </div> -->
    </section>
  </main>

  <script src="js/cake-order.js"></script>
  <script src="js/translations.js"></script>

</body>
